version: 2

models:
  - name: stg_orders
    columns:
      - name: order_id
        tests:
          - not_null
          - unique
      - name: amount_eur
        tests:
          - not_null
      - name: customer_email
        tests:
          - not_null

  - name: fact_sales_incremental
    columns:
      - name: order_id
        tests:
          - not_null
          - unique
      - name: amount_eur
        tests:
          - not_null
      - name: product_key
        tests:
          - not_null
          - relationships:
              to: source('dwh', 'dim_product')
              field: product_key
      - name: customer_key
        tests:
          - not_null
          - relationships:
              to: source('dwh', 'dim_customer')
              field: customer_key
